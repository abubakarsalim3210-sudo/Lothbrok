<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Section</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="food-menu.css">
</head>
<body>

<section class="menu">

    <h1>View Our Menu</h1>

    <div class="menu-container">

        <div class="card">
            <img src="Salads.jpg" alt="Salad">

            <button>READ MORE</button>
        </div>

        <div class="card">
            <img src="Dessert.jpg" alt="Dessert">

            <button>READ MORE</button>
        </div>

        <div class="card">
            <img src="Drinks.jpg" alt="Drinks">

            <button>READ MORE</button>

    </div>

    <p class="footer-text">

        Image from <span>Freepik</span>
    </p>

</html>
